<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Medic MDT - V5.5 Full Edition</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg-main: #0a0c10; --bg-card: rgba(18, 22, 32, 0.85); --bg-input: rgba(9, 11, 17, 0.9); --border-color: #242b3d; --text-main: #e2e8f0; --accent-green: #22c55e; --accent-blue: #3b82f6; --accent-red: #ef4444; --accent-amber: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; padding: 10px; font-size: 13px; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: rgba(10, 12, 16, 0.96); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #121620; border: 1px solid var(--border-color); padding: 30px; border-radius: 8px; width: 350px; text-align: center; }
        
        #mdt-container { display: none; height: 100%; flex-direction: column; gap: 10px; }
        .main-split { display: grid; grid-template-columns: 320px 1fr; gap: 12px; flex: 1; min-height: 0; }
        .input-field { padding: 8px; background: var(--bg-input); border: 1px solid var(--border-color); color: white; border-radius: 4px; width: 100%; }
        .triage-btn { flex: 1; padding: 8px; background: var(--bg-input); border: 1px solid var(--border-color); color: #7f8ea3; cursor: pointer; border-radius: 4px; }
        .triage-btn.active.green { border-color: var(--accent-green); color: var(--accent-green); background: #052e16; }
        
        .item-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg-card); border: 1px solid var(--border-color); margin-bottom: 4px; border-radius: 4px; }
        .qty-btn { width: 26px; height: 26px; background: var(--bg-input); border: 1px solid var(--border-color); color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3>MDT LOGIN</h3>
        <input type="text" id="login-id" class="input-field" placeholder="ID" style="margin-bottom:10px;">
        <input type="password" id="login-password" class="input-field" placeholder="Passwort" style="margin-bottom:10px;">
        <button class="btn" style="width:100%; padding:10px;" onclick="checkLogin()">Login</button>
    </div>
</div>

<div id="mdt-container" class="container">
    <div class="main-split">
        <div class="left-panel">
            <div class="triage-zone" style="display:flex; gap:5px;">
                <button class="triage-btn active green" id="triage-stable" onclick="setTriage('stable')">STABIL</button>
                <button class="triage-btn" id="triage-critical" onclick="setTriage('critical')">KRITISCH</button>
            </div>
            <input type="text" id="patient-name" class="input-field" placeholder="Patientenname">
            <button class="btn" onclick="copyInvoice()">📋 Bericht abschicken</button>
            <div id="history-box" style="flex:1; overflow-y:auto; border:1px solid #242b3d; padding:5px;">
                <ul id="history-list" style="list-style:none;"></ul>
            </div>
        </div>
        <div class="right-panel">
            <div id="items-container"></div>
        </div>
    </div>
</div>

<script>
    const medicDatabase = { "04": { name: "Dr. Herbert Meier", pass: "12345" } };
    const items = [
        { name: "Field Dressing", price: 40 },
        { name: "Epinephrine", price: 83 },
        { name: "Morphine", price: 87 }
    ];
    let qtys = { "Field Dressing": 0, "Epinephrine": 0, "Morphine": 0 };

    function checkLogin() {
        const id = document.getElementById('login-id').value;
        const pass = document.getElementById('login-password').value;
        if (medicDatabase[id] && medicDatabase[id].pass === pass) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mdt-container').style.display = 'flex';
            renderCatalog();
        } else { alert("Falsch!"); }
    }

    function renderCatalog() {
        const cont = document.getElementById('items-container');
        cont.innerHTML = items.map(i => `
            <div class="item-row">
                <span style="flex:1">${i.name}</span>
                <button class="qty-btn" onclick="updateQty('${i.name}', -1)">-</button>
                <span>${qtys[i.name]}</span>
                <button class="qty-btn" onclick="updateQty('${i.name}', 1)">+</button>
            </div>
        `).join('');
    }

    function updateQty(name, delta) {
        qtys[name] = Math.max(0, qtys[name] + delta);
        renderCatalog();
    }

    function setTriage(level) {
        document.querySelectorAll('.triage-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('triage-' + level).classList.add('active');
    }

    function copyInvoice() {
        alert("Bericht für " + document.getElementById('patient-name').value + " erstellt!");
    }
</script>
</body>
</html>

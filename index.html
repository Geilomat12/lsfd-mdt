
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Medic MDT - Full Suite</title>
<style>
  :root { --bg: #0a0c10; --card: #121620; --border: #242b3d; --text: #e2e8f0; --accent: #3b82f6; --green: #22c55e; --red: #ef4444; }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; padding: 10px; overflow: hidden; -webkit-app-region: drag; }
  
  .container { display: flex; flex-direction: column; height: 100%; gap: 10px; }
  .main-split { display: flex; gap: 15px; flex: 1; min-height: 0; -webkit-app-region: no-drag; }
  .left-panel { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  .right-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  
  .nerd-card { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 4px; }
  .input-field { padding: 8px; background: #090b11; border: 1px solid var(--border); color: white; border-radius: 4px; width: 100%; }
  .triage-btn { flex: 1; padding: 5px; cursor: pointer; border: 1px solid var(--border); background: #1e2538; color: white; }
  .triage-btn.active { border-color: var(--green); background: #052e16; }
  
  .section-label { font-size: 11px; font-weight: bold; padding: 8px; background: rgba(22, 27, 38, 0.8); margin-top: 5px; border-left: 3px solid var(--accent); cursor: pointer; display: flex; justify-content: space-between; }
  .item-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--card); border: 1px solid var(--border); }
  
  .window-controls { -webkit-app-region: no-drag; display: flex; gap: 5px; }
  button { cursor: pointer; background: var(--border); border: none; color: white; padding: 5px 10px; }
</style>
</head>
<body>

<div class="container">
  <header style="display: flex; justify-content: space-between; align-items: center;">
    <h1>MEDIC LOGISTICS MDT</h1>
    <div class="window-controls">
      <button onclick="minimizeWindow()">—</button>
      <button onclick="toggleFullscreen()">⛶</button>
      <button onclick="closeWindow()">✕</button>
    </div>
  </header>

  <div class="main-split">
    <div class="left-panel">
      <div class="nerd-card">
        <div style="display:flex; gap:5px; margin-bottom:10px;">
          <button class="triage-btn active" onclick="setTriage(this)">STABIL</button>
          <button class="triage-btn" onclick="setTriage(this)">KRITISCH</button>
          <button class="triage-btn" onclick="setTriage(this)">AKUT</button>
        </div>
        <label>Patientenname</label>
        <input type="text" id="patient-name" class="input-field">
      </div>
      
      <div class="nerd-card">
        <label>Makros</label>
        <button onclick="applyPreset('Schuss')">💥 Schusswunde</button>
        <button onclick="applyPreset('VU')">🚗 Unfall</button>
      </div>

      <button class="input-field" style="background:var(--green); cursor:pointer;" onclick="copyInvoice()">📋 Bericht an Discord</button>
    </div>

    <div class="right-panel">
      <div id="items-container" style="flex:1; overflow-y:auto;"></div>
      <div class="history-box" style="background: #090b11; padding: 10px;">
        <h3>Live-Logbuch</h3>
        <ul id="history-list"></ul>
      </div>
    </div>
  </div>
</div>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0c10; --card: #121620; --border: #242b3d; --text: #e2e8f0; --accent: #3b82f6; --green: #22c55e; }
  
  body { font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; padding: 10px; }
  
  .container { display: flex; flex-direction: column; height: 100%; gap: 10px; }
  
  .main-split { 
    display: flex; 
    gap: 15px; 
    flex: 1; 
    min-height: 0; /* Wichtig für Scrollen! */
    overflow: hidden; 
  }

  .left-panel { 
    width: 320px; 
    flex: 0 0 320px; /* Erzwingt feste 320px Breite */
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
  }

  .right-panel { 
    flex: 1; /* Nimmt alles, was übrig bleibt */
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
    min-width: 0; /* Verhindert, dass Flexbox-Elemente sich verzerren */
  }

  /* Sicherstellen, dass das Logbuch nicht das Layout sprengt */
  #items-container { flex: 1; overflow-y: auto; }
  .history-box { flex: 0 0 200px; overflow-y: auto; background: #090b11; padding: 10px; }
  
  .section-label { font-size: 11px; font-weight: bold; padding: 8px; background: rgba(22, 27, 38, 0.8); border-left: 3px solid var(--accent); cursor: pointer; }
  .item-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--card); border: 1px solid var(--border); }
</style>
  
<script>
  // 1. DATABASE & CONFIG
  const medicDatabase = { "04": { name: "Dr. Herbert Meier", pass: "1234" } };
  const DISCORD_WEBHOOK = "DEIN_WEBHOOK_URL";

  // 2. WINDOW CONTROLS
  function toggleFullscreen() { const { remote } = require('electron'); const win = remote.getCurrentWindow(); win.setFullScreen(!win.isFullScreen()); }
  function minimizeWindow() { require('electron').remote.getCurrentWindow().minimize(); }
  function closeWindow() { require('electron').remote.getCurrentWindow().close(); }

  // 3. MDT LOGIK
  function setTriage(btn) {
    document.querySelectorAll('.triage-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function applyPreset(type) { alert("Preset geladen: " + type); }

  function copyInvoice() {
    const text = "Bericht für " + document.getElementById('patient-name').value;
    navigator.clipboard.writeText(text);
    
    // Discord Webhook Aufruf
    fetch(DISCORD_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: text }) });
    alert("Bericht kopiert & gesendet!");
  }

  // Hier das Rendering einfügen (wie in der vorherigen Version)
  console.log("MDT Bereit.");
</script>
</body>
</html>

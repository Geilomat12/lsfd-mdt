<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Medic MDT // V5.5</title>
<style>
  /* --- FENSTER-DESIGN FÜR VERSCHIEBBARKEIT --- */
  body { background: transparent; margin: 0; padding: 10px; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; color: #e2e8f0; }
  .window-frame { background: rgba(13, 17, 23, 0.96); border: 1px solid #242b3d; border-radius: 8px; height: 100%; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  .drag-header { height: 40px; -webkit-app-region: drag; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px dashed #242b3d; }
  .no-drag { -webkit-app-region: no-drag; }
  
  /* --- MDT STYLING --- */
  :root { --bg-card: rgba(18, 22, 32, 0.85); --bg-input: rgba(9, 11, 17, 0.9); --border-color: #242b3d; --text-main: #e2e8f0; --accent-blue: #3b82f6; --accent-green: #22c55e; --accent-red: #ef4444; --accent-amber: #f59e0b; --accent-teal: #0d9488; }
  .container { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
  .main-split { display: grid; grid-template-columns: 320px 1fr; gap: 12px; flex: 1; min-height: 0; }
  .left-panel, .right-panel { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
  .nerd-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; }
  .input-field { padding: 8px; background: var(--bg-input); border: 1px solid var(--border-color); color: white; border-radius: 4px; width: 100%; }
  .btn { cursor: pointer; padding: 8px; border: 1px solid var(--border-color); color: white; border-radius: 4px; background: #21262d; }
  .triage-btn { flex: 1; padding: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: #7f8ea3; cursor: pointer; border-radius: 4px; }
  .triage-btn.active.green { border-color: var(--accent-green); color: var(--accent-green); background: #052e16; }
  .triage-btn.active.amber { border-color: var(--accent-amber); color: var(--accent-amber); background: #451a03; }
  .triage-btn.active.red { border-color: var(--accent-red); color: var(--accent-red); background: #450a0a; }
  
  #login-screen { position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px); background: #0a0c10; z-index: 999; display: flex; justify-content: center; align-items: center; }
  .login-box { background: #121620; padding: 30px; border: 1px solid #242b3d; border-radius: 8px; width: 350px; text-align: center; }
</style>
</head>
<body>

<div class="window-frame">
  <div class="drag-header">
    <span style="color:#22c55e; font-weight:bold;">MEDIC LOGISTICS MDT // V5.5</span>
    <div class="no-drag">
      <button class="btn" onclick="require('electron').remote.getCurrentWindow().minimize()">—</button>
      <button class="btn" onclick="require('electron').remote.getCurrentWindow().close()" style="color:var(--accent-red)">✕</button>
    </div>
  </div>

  <div id="login-screen">
    <div class="login-box">
      <h3>LOGIN</h3>
      <input type="text" id="login-id" class="input-field" placeholder="ID" style="margin-bottom:10px;">
      <input type="password" id="login-password" class="input-field" placeholder="Passwort" style="margin-bottom:10px;">
      <button class="btn" onclick="checkLogin()" style="width:100%;">Freischalten</button>
    </div>
  </div>

  <div class="container" id="mdt-container" style="display:none;">
    <div class="main-split">
      <div class="left-panel">
        <div class="nerd-card">
           <div class="triage-zone" style="display:flex; gap:5px;">
             <button class="triage-btn active green" id="triage-stable" onclick="setTriage('stable')">STABIL</button>
             <button class="triage-btn amber" id="triage-critical" onclick="setTriage('critical')">KRITISCH</button>
             <button class="triage-btn red" id="triage-acute" onclick="setTriage('acute')">AKUT</button>
           </div>
        </div>
        <input type="text" id="patient-name" class="input-field" placeholder="Patientenname">
        <button class="btn" style="background:var(--accent-blue);" onclick="copyInvoice()">📋 Bericht abschicken</button>
        <div class="history-box" style="background:#0d1117; padding:10px; flex:1; overflow-y:auto; border:1px solid #242b3d;">
            <ul id="history-list" style="list-style:none; font-size:12px;"></ul>
        </div>
      </div>
      <div class="right-panel">
        <div id="items-container" style="overflow-y:auto; flex:1;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const { remote } = require('electron');
  const medicDatabase = { "04": { name: "Dr. Herbert Meier", pass: "12345" } };
  let currentTriage = 'stable';
  
  function checkLogin() {
    const id = document.getElementById('login-id').value;
    const pass = document.getElementById('login-password').value;
    if (medicDatabase[id] && medicDatabase[id].pass === pass) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('mdt-container').style.display = 'flex';
      render();
    } else { alert("Falsch!"); }
  }

  function setTriage(level) {
    currentTriage = level;
    document.querySelectorAll('.triage-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('triage-' + level).classList.add('active');
  }

  function render() {
     document.getElementById('items-container').innerHTML = "<div>Katalog geladen...</div>";
  }

  function copyInvoice() {
    const text = `Bericht für ${document.getElementById('patient-name').value} | Status: ${currentTriage}`;
    navigator.clipboard.writeText(text);
    alert("Bericht kopiert!");
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medic MDT - Full Operational Mode</title>
    <style>
        /* CSS-Grundgerüst für sauberes Layout */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0c10; color: #e2e8f0; height: 100vh; overflow: hidden; font-size: 13px; }
        
        /* Layout-Container */
        .window-frame { display: flex; flex-direction: column; height: 100%; border: 1px solid #242b3d; }
        .drag-header { height: 40px; -webkit-app-region: drag; background: #0d1117; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px dashed #242b3d; }
        .container { display: flex; flex: 1; padding: 12px; gap: 12px; overflow: hidden; }
        
        /* Panels */
        .left-panel { width: 320px; display: flex; flex-direction: column; gap: 8px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        /* Elemente */
        .input-field { padding: 8px; background: #090b11; border: 1px solid #242b3d; color: white; border-radius: 4px; width: 100%; }
        .btn { padding: 8px; cursor: pointer; border: 1px solid #242b3d; color: white; border-radius: 4px; background: #21262d; font-weight: bold; }
        .btn:hover { border-color: #3b82f6; }
        .history-list { list-style: none; overflow-y: auto; flex: 1; font-size: 12px; }
        
        /* Login Layer */
        #login-screen { position: absolute; inset: 0; background: rgba(10, 12, 16, 0.96); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #121620; padding: 30px; border: 2px solid #242b3d; border-radius: 8px; width: 380px; text-align: center; }
    </style>
</head>
<body>

<div class="window-frame">
    <div class="drag-header">
        <span style="color:#22c55e; font-weight:bold;">MEDIC LOGISTICS MDT // V5.5</span>
        <button class="btn" style="-webkit-app-region: no-drag;" onclick="window.close()">✕</button>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2>🔒 MDT LOGIN</h2>
            <input type="text" id="login-id" class="input-field" placeholder="Dienstnummer (ID)" style="margin: 10px 0;">
            <input type="password" id="login-password" class="input-field" placeholder="Sicherheitsschlüssel" style="margin-bottom: 10px;">
            <button class="btn" style="width:100%; background: #3b82f6;" onclick="checkLogin()">MDT freischalten</button>
        </div>
    </div>

    <div class="container" id="mdt-container" style="display:none;">
        <div class="left-panel">
            <input type="text" id="patient-name" class="input-field" placeholder="Patientenname">
            <button class="btn" style="background:#22c55e;" onclick="copyInvoice()">📋 Bericht abschicken</button>
            <div id="history-box" style="flex:1; border:1px dashed #242b3d; padding:10px; background:#090b11;">
                <p>Live-Logbuch:</p>
                <ul id="history-list" class="history-list"></ul>
            </div>
        </div>
        <div class="right-panel">
            <div id="items-container" style="overflow-y:auto; flex:1;"></div>
        </div>
    </div>
</div>

<script>
    // Datenbank & State
    const medicDatabase = { "04": { name: "Dr. Herbert Meier", pass: "12345" } };
    let qtys = {}; 
    let masterHistory = JSON.parse(localStorage.getItem('medic_history') || "[]");

    // Login-Logik
    function checkLogin() {
        const id = document.getElementById('login-id').value;
        const pass = document.getElementById('login-password').value;
        if (medicDatabase[id] && medicDatabase[id].pass === pass) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mdt-container').style.display = 'flex';
            renderCatalog();
            updateHistoryDOM();
        } else {
            alert("Zugriff verweigert!");
        }
    }

    // Katalog rendern
    function renderCatalog() {
        const container = document.getElementById('items-container');
        container.innerHTML = "<div>Katalog geladen.</div>";
    }

    // Bericht kopieren & speichern
    function copyInvoice() {
        const pName = document.getElementById('patient-name').value;
        const report = `Bericht: ${pName} | Zeit: ${new Date().toLocaleTimeString()}`;
        
        navigator.clipboard.writeText(report).then(() => {
            masterHistory.unshift({ name: pName, time: new Date().toLocaleTimeString() });
            localStorage.setItem('medic_history', JSON.stringify(masterHistory));
            updateHistoryDOM();
            alert("Bericht kopiert!");
        });
    }

    // Historie aktualisieren
    function updateHistoryDOM() {
        const list = document.getElementById('history-list');
        list.innerHTML = masterHistory.map(h => `<li>🕒 ${h.time} - ${h.name}</li>`).join('');
    }
</script>
</body>
</html>
